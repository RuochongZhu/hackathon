services:
  - type: web
    name: twinreadmit-dashboard
    runtime: docker
    dockerfilePath: ./dashboard/Dockerfile
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
