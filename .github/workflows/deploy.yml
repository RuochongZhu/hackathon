name: Deploy to DigitalOcean App Platform

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q tests

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DO_DEPLOY_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN || secrets.DO_API_TOKEN || secrets.DIGITALOCEAN_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate DigitalOcean token
        run: |
          if [ -z "${DO_DEPLOY_TOKEN}" ]; then
            echo "Missing DigitalOcean deploy token."
            echo "Set one of these GitHub secrets: DIGITALOCEAN_ACCESS_TOKEN, DO_API_TOKEN, DIGITALOCEAN_TOKEN"
            exit 1
          fi

      - name: Deploy app
        uses: digitalocean/app_action/deploy@v2
        env:
          APP_NAME: twinreadmit-api
          DEPLOY_BRANCH: main
          GITHUB_REPOSITORY: ${{ github.repository }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_REVISION: ${{ github.sha }}
        with:
          token: ${{ env.DO_DEPLOY_TOKEN }}
          app_spec_location: .do/app.yaml
          print_build_logs: true
          print_deploy_logs: true
