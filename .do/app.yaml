name: ${APP_NAME}
region: nyc
alerts:
  - rule: DEPLOYMENT_FAILED
services:
  - name: api
    github:
      repo: ${GITHUB_REPOSITORY}
      branch: ${DEPLOY_BRANCH}
      deploy_on_push: false
    dockerfile_path: Dockerfile
    source_dir: /
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
      port: 8080
      initial_delay_seconds: 10
      period_seconds: 15
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: APP_ENV
        value: production
        scope: RUN_TIME
      - key: LOG_LEVEL
        value: INFO
        scope: RUN_TIME
      - key: OPENAI_MODEL
        value: gpt-4o-mini
        scope: RUN_TIME
      - key: OPENAI_API_KEY
        value: ${OPENAI_API_KEY}
        type: SECRET
        scope: RUN_TIME
      - key: DATABASE_URL
        value: ${DATABASE_URL}
        type: SECRET
        scope: RUN_TIME
  - name: dashboard
    github:
      repo: ${GITHUB_REPOSITORY}
      branch: ${DEPLOY_BRANCH}
      deploy_on_push: false
    dockerfile_path: dashboard/Dockerfile
    source_dir: /
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /
      port: 8080
      initial_delay_seconds: 20
      period_seconds: 20
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: APP_ENV
        value: production
        scope: RUN_TIME
      - key: LOG_LEVEL
        value: INFO
        scope: RUN_TIME
      - key: OPENAI_MODEL
        value: gpt-4o-mini
        scope: RUN_TIME
      - key: OPENAI_API_KEY
        value: ${OPENAI_API_KEY}
        type: SECRET
        scope: RUN_TIME
      - key: DATABASE_URL
        value: ${DATABASE_URL}
        type: SECRET
        scope: RUN_TIME
      - key: SUPABASE_URL
        value: ${SUPABASE_URL}
        type: SECRET
        scope: RUN_TIME
      - key: SUPABASE_ANON_KEY
        value: ${SUPABASE_ANON_KEY}
        type: SECRET
        scope: RUN_TIME
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: ${SUPABASE_SERVICE_ROLE_KEY}
        type: SECRET
        scope: RUN_TIME
ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: api
    - match:
        path:
          prefix: /
      component:
        name: dashboard
